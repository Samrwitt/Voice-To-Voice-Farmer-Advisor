;
; sip.conf — Asterisk SIP configuration for Voice-to-Voice Farmer Advisor
;
; Two peers are defined:
;   1. "advisor"    — the telephony_service (SIP UAC that handles calls)
;   2. "softphone"  — your test softphone (Zoiper / Linphone on your PC)
;

[general]
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
transport=udp,tcp
srvlookup=yes
nat=force_rport,comedia
directmedia=no
qualify=yes

; ── The telephony_service SIP account ────────────────────────────────────────
[advisor]
type=friend
secret=changeme          ; matches SIP_PASS in docker-compose / .env
host=dynamic
context=default
disallow=all
allow=ulaw               ; G.711 μ-law — matches telephony_service audio format
canreinvite=no
nat=force_rport,comedia

; ── Test softphone account (for dialling in during development) ───────────────
[testphone]
type=friend
secret=testpass123
host=dynamic
context=default
disallow=all
allow=ulaw
canreinvite=no
nat=force_rport,comedia
