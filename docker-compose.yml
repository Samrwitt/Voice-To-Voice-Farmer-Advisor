version: '3.8'

services:
  stt_service:
    build: ./stt_service
    ports:
      - "8001:8000"
    environment:
      - WHISPER_MODEL=medium      # options: tiny | base | small | medium
      - WHISPER_THREADS=8        # Ryzen 7 7840HS: 8 cores
    volumes:
      - ./data:/data

  logic_service:
    build: ./logic_service
    ports:
      - "8002:8000"
    environment:
      - TTS_URL=http://tts_service:8000/synthesize
      - STT_URL=http://stt_service:8000/transcribe
      - DATA_DIR=/data
      - RAG_DISTANCE_THRESHOLD=1.2
    volumes:
      - ./logic_service:/app
      - ./data:/data
    depends_on:
      - stt_service
      - tts_service

  tts_service:
    build: ./tts_service
    ports:
      - "8003:8000"
    volumes:
      - ./data:/data

  admin_dashboard:
    build: ./admin_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./admin_dashboard:/app
      - ./data:/data
    depends_on:
      - logic_service

  telephony_service:
    build: ./telephony_service
    environment:
      - STT_URL=http://stt_service:8000/transcribe
      - LOGIC_URL=http://logic_service:8000/ask
      - SAVE_RECORD_URL=http://logic_service:8000/save_call_record
      - TTS_URL=http://tts_service:8000/synthesize
      - SIP_IP=0.0.0.0
      - SIP_PORT=5060
      - SIP_USER=${SIP_USER:-advisor}
      - SIP_PASS=${SIP_PASS:-changeme}
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ./telephony_service:/app
      - ./data:/data
    depends_on:
      - stt_service
      - logic_service
      - tts_service

  # ── New: Web Frontend (nginx SPA) ────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - logic_service
    restart: unless-stopped

