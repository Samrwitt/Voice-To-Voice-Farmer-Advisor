<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Phone Gateway</title>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="phone">

    <div id="callerForm" class="caller-form">
      <h2>Caller Registration</h2>

      <input id="fullName" type="text" placeholder="Full name" />
      <input id="phoneNumber" type="tel" placeholder="Phone number" />

      <button onclick="registerCaller()">Continue</button>
    </div>

    <div id="dialer" class="hidden">
      <div class="screen">
        <div id="callerInfo"></div>
        <div id="status">Idle</div>
        <div id="timer">00:00</div>
        <input id="numberDisplay" type="text" readonly placeholder="Dial number" />
      </div>

      <div class="keypad">
        <button onclick="pressKey('1')">1</button>
        <button onclick="pressKey('2')">2</button>
        <button onclick="pressKey('3')">3</button>

        <button onclick="pressKey('4')">4</button>
        <button onclick="pressKey('5')">5</button>
        <button onclick="pressKey('6')">6</button>

        <button onclick="pressKey('7')">7</button>
        <button onclick="pressKey('8')">8</button>
        <button onclick="pressKey('9')">9</button>

        <button onclick="pressKey('*')">*</button>
        <button onclick="pressKey('0')">0</button>
        <button onclick="pressKey('#')">#</button>
      </div>

      <div class="controls">
        <button class="delete" onclick="deleteKey()">⌫</button>
        <button class="call" onclick="startCall()">Call</button>
        <button class="end" onclick="endCall()">End</button>
      </div>

      <button class="change-user" onclick="clearCaller()">Change caller</button>

      <div id="sessionInfo"></div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
